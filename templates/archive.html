<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ seo_title }}</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <header>
        <nav class="container">
            <a href="/" class="logo">🚢 货代日报</a>
            <div class="nav-right">
                <a href="/">首页</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <h1>📅 往期日报</h1>
        {% for date, arts in articles_by_date %}
        <section class="archive-date">
            <h2>{{ date }}</h2>
            <ul class="archive-list">
                {% for a in arts %}
                <li>
                    <a href="/articles/{{ a.get('filename', '') }}">{{ a.get('seo_title', a.get('title', '')) }}</a>
                </li>
                {% endfor %}
            </ul>
        </section>
        {% endfor %}
    </main>

    <footer>
        <div class="container">
            <p>货代日报 · 每日5分钟决策简报</p>
        </div>
    </footer>
</body>
</html>
